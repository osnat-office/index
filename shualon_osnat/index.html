<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המדד של אסנת | בדיקת יעילות עסקית</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --osnat-blue: #1e3d6b; --osnat-orange: #f39c12; --bg: #f4f7f9; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; color: #333; }
        .card { background: white; padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--osnat-orange); margin-bottom: 10px; }
        h1 { color: var(--osnat-blue); font-size: 1.5rem; margin-bottom: 15px; font-weight: 800; line-height: 1.3; }
        .intro-text { font-size: 1.15rem; line-height: 1.5; margin-bottom: 25px; color: #444; font-weight: 600; background: #fff8f0; padding: 15px; border-radius: 12px; border: 1px solid #fee4c4; }
        .question { display: none; text-align: right; }
        .question.active { display: block; }
        label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--osnat-blue); font-size: 1.1rem; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; font-family: 'Assistant'; font-size: 1rem; box-sizing: border-box; }
        .btn { background: var(--osnat-blue); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: 700; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        .btn-finish { background: var(--osnat-orange); color: white; }
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 4px; margin-bottom: 25px; }
        .progress { height: 100%; background: var(--osnat-orange); width: 0%; border-radius: 4px; transition: 0.5s; }
        .result-box { display: none; padding: 20px; border-radius: 12px; background: #f9f9f9; border-right: 5px solid var(--osnat-orange); text-align: center; }
        .money-highlight { color: #27ae60; font-weight: 800; font-size: 1.3rem; margin: 15px 0; border: 2px dashed #27ae60; padding: 10px; border-radius: 10px; }
        .small-note { font-size: 0.85rem; color: #777; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.jpg" alt="המשרד של אסנת" class="logo">
    <h1>אולי גם העסק שלך צריך שירותי אדמיניסטרציה מרחוק?</h1>
    <p class="intro-text" id="intro">נעים מאוד! בואו נבדוק ב-60 שניות כמה זמן וכסף תוכלו לחסוך לעסק שלכם בעזרת ניהול נכון.</p>
    
    <div id="quiz">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        
        <div class="question active" id="q1">
            <label>כמה שעות שבועיות את/ה משקיע/ה במטלות אדמיניסטרטיביות (גבייה, פגישות, סדר)?</label>
            <input type="number" id="hours" placeholder="למשל: 10">
            <button class="btn" onclick="nextQuestion(1)">המשך</button>
        </div>

        <div class="question" id="q2">
            <label>האם קרה שפספסת פגישה או דחית לקוח בגלל עומס?</label>
            <select id="denied">
                <option value="10">כן, לעיתים קרובות</option>
                <option value="5">קרה פעם-פעמיים</option>
                <option value="0">אף פעם לא</option>
            </select>
            <button class="btn" onclick="nextQuestion(2)">המשך</button>
        </div>

        <div class="question" id="q3">
            <label>כמה זמן לוקח לך לחזור לליד חדש?</label>
            <select id="response">
                <option value="10">יותר מיום</option>
                <option value="5">כמה שעות</option>
                <option value="0">דקות ספורות</option>
            </select>
            <button class="btn" onclick="nextQuestion(3)">המשך</button>
        </div>

        <div class="question" id="q4">
            <label>האם היית רוצה להשקיע יותר זמן בפיתוח העסק?</label>
            <select id="expert">
                <option value="10">חייב/ת את זה דחוף</option>
                <option value="5">כן, זה היה עוזר</option>
                <option value="0">אני מסתדר/ת</option>
            </select>
            <button class="btn" onclick="calculateResult()">סיום וקבלת תוצאה</button>
        </div>
    </div>

    <div id="result" class="result-box">
        <h2>תוצאות המבדק:</h2>
        <div id="final-score" style="font-size: 2.5rem; font-weight: 800; color: var(--osnat-blue);">0%</div>
        <p style="margin:0;">מדד הצורך בניהול חיצוני</p>
        
        <div id="money-result" class="money-highlight"></div>
        <div class="small-note">*לפי ממוצע שוק של 250 ש"ח לשעת עבודה</div>
        
        <p id="result-text" style="font-weight:700; margin-top:10px;"></p>
        
        <button class="btn btn-finish" id="wa-btn" style="font-size: 1.1rem;">שלח/י לאסנת את התוצאות לשיחת היכרות חינם</button>
    </div>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 4;

    function nextQuestion(step) {
        document.getElementById('intro').style.display = 'none';
        document.getElementById('q' + step).classList.remove('active');
        currentStep++;
        document.getElementById('q' + currentStep).classList.add('active');
        document.getElementById('progress').style.width = ((currentStep-1)/totalSteps)*100 + '%';
    }

    function calculateResult() {
        const h = parseInt(document.getElementById('hours').value) || 0;
        const d = parseInt(document.getElementById('denied').value);
        const r = parseInt(document.getElementById('response').value);
        const e = parseInt(document.getElementById('expert').value);
        
        const total = (h * 2.5) + d + r + e;
        const score = Math.min(Math.round((total / 50) * 100), 100);
        const hourlyRate = 250;
        const monthlySavings = h * hourlyRate * 4;

        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('final-score').innerText = score + '%';

        if(monthlySavings > 0) {
            document.getElementById('money-result').innerText = "פוטנציאל חיסכון: כ-" + monthlySavings.toLocaleString() + " ₪ בחודש";
        }

        let msg = score > 70 ? "העסק שלך זקוק לאוויר! השקעה באדמיניסטרציה תחזיר לך זמן וצמיחה." : score > 35 ? "יש כאן פוטנציאל אדיר לייעול. שחרור המטלות יפנה לך זמן יקר." : "מצב טוב, אך תמיד אפשר לשפר מערכות כדי לגדול בלי להתאמץ.";
        document.getElementById('result-text').innerText = msg;

        const waText = encodeURIComponent(
            "היי אסנת, עשיתי את המבדק באתר שלך!\n\n" +
            "*התוצאות שלי:*\n" +
            "← מדד צורך באדמיניסטרציה: " + score + "%\n" +
            "← שעות שבועיות לחיסכון: " + h + "\n" +
            "← פוטנציאל חיסכון חודשי: " + monthlySavings.toLocaleString() + " ₪\n\n" +
            "אשמח שנתאם שיחת היכרות."
        );
        
        document.getElementById('wa-btn').onclick = function() {
            window.location.href = 'https://wa.me/972545726643?text=' + waText;
        };
    }
</script>

</body>
</html>
